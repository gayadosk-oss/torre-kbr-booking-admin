<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Torre KBR • Guest Ledger</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --shadow:0 10px 28px rgba(17,24,39,.08); --accent:#2563eb; --danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky; top:0; z-index:50;background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;}
    .headerInner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
    .btn{border:1px solid var(--border);background:#fff;padding:9px 14px;border-radius:12px;font-weight:800;font-size:13px;cursor:pointer;text-decoration:none; display:inline-flex; align-items:center; gap:5px;}
    .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
    .btn.danger{color:var(--danger); border-color:var(--danger)}
    .wrap{max-width:1400px;margin:0 auto;padding:16px}
    
    .toolbar{background:#fff;border:1px solid var(--border);border-radius:16px;padding:12px;display:flex;gap:12px;margin-bottom:16px;align-items:center;box-shadow:var(--shadow)}
    input, select{border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;outline:none}

    .ledger-wrap { background:#fff; border-radius:16px; border:1px solid var(--border); overflow-x:auto; box-shadow:var(--shadow); }
    table { width:100%; border-collapse:collapse; min-width:1100px; font-size:13px; }
    th { background:#f8fafc; color:var(--accent); padding:14px; text-align:left; border-bottom:2px solid var(--border); font-weight:800; text-transform:uppercase; }
    td { padding:14px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
    tbody tr:hover { background: #f8fafc; cursor: pointer; }
    .bal { color: var(--danger); font-weight: 800; }

    .modalOverlay{position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:100; padding:15px;}
    .modal{ background:#fff; padding:24px; border-radius:20px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); }
    .formGrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .full{ grid-column: span 2; }
    label{ display:block; font-size:11px; font-weight:900; color:var(--muted); margin-bottom:4px; text-transform:uppercase; }
    
    .fab { position:fixed; bottom:24px; right:24px; width:60px; height:60px; background:var(--accent); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; border:none; box-shadow:0 4px 15px rgba(37,99,235,0.4); cursor:pointer; }
  </style>
</head>
<body>

<header>
  <div class="headerInner">
    <h1>Torre KBR • Guest Ledger</h1>
    <div style="font-size: 12px; font-weight: bold; color: var(--muted);">2026 DIGITAL LOGBOOK</div>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search by name, unit, or remarks..." style="flex:1" onkeyup="filterTable()">
    <button class="btn" onclick="loadLedger()">🔄 Refresh</button>
  </div>

  <div class="ledger-wrap">
    <table id="ledgerTable">
      <thead>
        <tr>
          <th>Date</th><th>Name</th><th>Pax</th><th>Check-In</th><th>Unit</th><th>DP</th><th>Balance</th><th>Total</th><th>MOP</th><th>Contact</th>
        </tr>
      </thead>
      <tbody id="ledgerBody">
        <tr><td colspan="10" style="text-align:center;padding:40px">Loading Ledger...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin-top:0">Add Guest Record</h2>
    <input type="hidden" id="BookingID">
    <div class="formGrid">
      <div class="field"><label>Booking Date</label><input type="date" id="Date"></div>
      <div class="field"><label>Check-In Date</label><input type="date" id="Check-In"></div>
      <div class="field full"><label>Guest Name</label><input id="Name"></div>
      <div class="field"><label>Unit</label><select id="Unit"></select></div>
      <div class="field"><label># of Pax</label><input type="number" id="# of Pax"></div>
      <div class="field"><label>DP (Amount)</label><input type="number" id="DP"></div>
      <div class="field"><label>Balance (Amount)</label><input type="number" id="Balance"></div>
      <div class="field"><label>Total (Amount)</label><input type="number" id="Total"></div>
      <div class="field"><label>M.O.P</label><input id="MOP"></div>
      <div class="field full"><label>Contact No.</label><input id="CP No."></div>
      <div class="field full"><label>Remarks</label><input id="Remarks"></div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:20px;">
      <button id="deleteBtn" class="btn danger" style="display:none;" onclick="deleteEntry()">Delete Record</button>
      <div style="display:flex; gap:10px; margin-left: auto;">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button id="saveBtn" class="btn primary" onclick="saveEntry()">Save Ledger</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzv3aXkkAihx0hiR5tFx3VlabaYpLiAdqaysldk-0RwcyMNTW_1qfbANudn9FkSIllCdQ/exec"; 
  const API_KEY = "kbr_super_secret_2026";
  const UNITS = ["D1","D2","C1","C2","C3","B1","B2","A1","A2","ROOM A","ROOM B","ROOM C"];
  let RAW_RECORDS = [];

  const uSelect = document.getElementById("Unit");
  UNITS.forEach(u => uSelect.add(new Option(u, u)));

  async function loadLedger() {
    try {
      const resp = await fetch(API_URL);
      const res = await resp.json();
      if(res.ok) {
        RAW_RECORDS = res.records;
        renderTable(RAW_RECORDS);
      }
    } catch(e) { console.error("Load failed", e); }
  }

  function renderTable(records) {
    document.getElementById("ledgerBody").innerHTML = records.map((r, index) => `
      <tr onclick="editRecord(${index})">
        <td>${r["Date"]}</td>
        <td style="font-weight:bold">${r["Name"]}</td>
        <td>${r["# of Pax"]}</td>
        <td>${r["Check-In"]}</td>
        <td style="color:var(--accent);font-weight:bold">${r["Unit"]}</td>
        <td>${r["DP"]}</td>
        <td class="${parseFloat(r["Balance"]) > 0 ? 'bal' : ''}">${r["Balance"]}</td>
        <td>${r["Total"]}</td>
        <td>${r["MOP"]}</td>
        <td>${r["CP No."]}</td>
      </tr>
    `).join('');
  }

  function editRecord(index) {
    const r = RAW_RECORDS[index];
    document.getElementById("modalTitle").innerText = "Edit Record";
    document.getElementById("BookingID").value = r["Booking ID"];
    
    const fields = ["Date","Name","# of Pax","Check-In","Unit","DP","Balance","Total","MOP","CP No.","Remarks"];
    fields.forEach(f => { document.getElementById(f).value = r[f] || ""; });

    document.getElementById("deleteBtn").style.display = "block";
    openModal();
  }

  async function saveEntry() {
    const bId = document.getElementById("BookingID").value || "BK-" + Date.now();
    const fields = ["Date","Name","# of Pax","Check-In","Unit","DP","Balance","Total","MOP","CP No.","Remarks"];
    const entryData = { "Booking ID": bId };
    fields.forEach(f => entryData[f] = document.getElementById(f).value);

    const btn = document.getElementById("saveBtn");
    btn.innerText = "Saving...";
    btn.disabled = true;

    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ key: API_KEY, data: entryData })
    });
    
    btn.innerText = "Save Ledger";
    btn.disabled = false;
    closeModal();
    loadLedger();
  }

  async function deleteEntry() {
    if(!confirm("Are you sure you want to permanently delete this record?")) return;
    const bId = document.getElementById("BookingID").value;
    
    const btn = document.getElementById("deleteBtn");
    btn.innerText = "Deleting...";
    btn.disabled = true;

    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ 
        key: API_KEY, 
        data: { "Booking ID": bId, "_delete": true } 
      })
    });

    closeModal();
    loadLedger();
  }

  function filterTable() {
    const input = document.getElementById("searchInput").value.toUpperCase();
    const filtered = RAW_RECORDS.filter(r => 
      Object.values(r).join(" ").toUpperCase().includes(input)
    );
    renderTable(filtered);
  }

  function openModal() { document.getElementById("modalOverlay").style.display="flex"; }
  function closeModal() { 
    document.getElementById("modalOverlay").style.display="none"; 
    document.getElementById("BookingID").value = "";
    document.getElementById("deleteBtn").style.display = "none";
    document.getElementById("modalTitle").innerText = "Add Guest Record";
    document.querySelectorAll(".modal input").forEach(i => i.value = "");
  }
  
  loadLedger();
</script>
</body>
</html>
