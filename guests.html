<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Torre KBR • Guests Information</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --accent:#2563eb; --danger:#dc2626; --success:#059669;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
    
    header{padding:16px; border-bottom:1px solid var(--border); background:#fff; position:sticky; top:0; z-index:50}
    .headerInner{max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between}
    h1{margin:0; font-size:18px; font-weight:800}
    
    .mainLink{ text-decoration:none; background:#0f172a; color:#fff; padding:8px 16px; border-radius:8px; font-weight:600; font-size:13px; }

    .wrap{max-width:1400px; margin:0 auto; padding:15px}
    
    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      justify-content: start;
    }
	
    .btn-refresh {
	  cursor: pointer;
	  height: 40px;
	  width: 40px; /* Force it to be square */
	  border: 1px solid var(--border);
	  border-radius: 8px;
	  background: #fff;
	  font-size: 18px;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  padding: 0; /* Remove padding that might stretch it */
	  justify-self: end;
	}
	
	#searchInput { 
	  grid-column: span 3; /* Forces search to take up its own row below the others */
	  width: 100%; 
	  border: 1px solid var(--border); 
	  border-radius: 8px; 
	  padding: 12px; 
	  font-size: 16px; /* Larger font for better mobile tap target */
	  outline: none; 
	  background: #f8fafc; /* Slight tint to distinguish it from the top row */
	}

    #sortSelect {
	  width: 100%;
	  max-width: 200px;
	  border:1px solid var(--border);
	  border-radius:8px; padding:10px;
	  font-size:14px;
	  outline:none;
	  cursor: pointer;
	  background: #fff;
	}

    .sync-status { 
      font-size: 9px; color: #fff; font-weight: 800; text-transform: uppercase; 
      background: var(--muted); padding: 6px 10px; border-radius: 6px; 
      text-align: center; line-height: 1.1; min-width: 90px; white-space: nowrap;
    }
    .status-ok { background: var(--success) !important; }
    .status-loading { background: var(--accent) !important; animation: pulse 1s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    .ledger-wrap {
	  background:#fff;
	  border-radius:12px;
	  border:1px solid var(--border);
	  overflow-x:auto;
	  box-shadow:var(--shadow);
	  contain: content; /* Efficiency: Limits layout calculations */
	}
	
    table {
	  width:100%;
	  border-collapse:collapse;
	  min-width:1100px;
	  font-size:13px;
	}
	
    th { 
	  background:#f8fafc;
	  color:var(--accent);
	  padding:12px;
	  text-align:left;
	  border-bottom:2px solid var(--border);
	  font-weight:800; text-transform:uppercase;
	  position: sticky;
	  top: 0;
	  z-index: 5;
	}
    td { padding:12px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
    tbody tr:hover { background: #f8fafc; cursor: pointer; }
    .bal { color: var(--danger); font-weight: 800; }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; padding-bottom: 80px; }
    .btn-page { background: #fff; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

    .modalOverlay{
	  position:fixed;
	  inset:0;
	  background:rgba(15, 23, 42, 0.6);
	  display:none;
	  justify-content:center;
	  align-items: center;
	  z-index: 100;
	  padding: 15px;
	  backdrop-filter: blur(4px);
	  overflow-y: auto;
	  overflow: hidden;
	}
	
    .modal{
	  background:#fff;
	  width: 95%;
	  max-width: 550px;
	  border-radius:16px;
	  padding:25px;
	  margin: 0;
	  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
	  max-height: 90vh;
	  overflow-y: auto;
	  position: relative;
	  overflow-x: hidden;
	}
    
	.formGrid{ 
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap:15px;
		width: 100%;
		box-sizing: border-box;
	}
	
	.field {
	  display: flex;
	  flex-direction: column;
	  width: 100%;
	}
	
    .full{
	  grid-column: span 2;
	}
	
	/* Makes the date fields narrower and more compact */
	.field input[type="date"] {
	  max-width: 200px; /* Limits the width so they don't look too long */
	  padding: 10px;     /* Reduces internal spacing */
	  font-size: 16px;  /* Slightly smaller text to match the smaller box */
	}
		
    label{
	  display:block;
	  font-size:10px;
	  font-weight:900;
	  color:var(--muted);
	  margin-bottom:4px;
	  text-transform:uppercase;
	}
	
    .field input, .field select {
	  width: 100%;
	  border: 1px solid var(--border);
	  border-radius: 8px;
	  padding: 10px;
	  font-size: 16px;
	  background: #fff;
	  max-width: 100%;
	  box-sizing: border-box;
	}

    .actions{
	  margin-top:20px;
	  display:flex;
	  flex-wrap: wrap;
	  justify-content:flex-end;
	  gap:10px;
	  border-top:1px solid var(--border);
	  padding-top:15px
	}
	
    .btn-save{
	  background:var(--accent);
	  color:#fff;
	  border:none;
	  padding:12px 20px;
	  border-radius:8px;
	  font-weight:600;
	  cursor:pointer;
	}
	
    .btn-cancel{
	  background:#f1f5f9;
	  border:none;
	  padding:12px 15px;
	  border-radius:8px;
	  font-weight:600;
	  cursor:pointer;
	}
	
    .btn-del{
	  color: #fff;
	  background: #e74c3c;
	  border:none;
	  padding:12px 20px;
	  border-radius:8px;
	  font-weight:600;
	  cursor:pointer;
	}

    .fab {
	  position:fixed;
	  bottom:20px;
	  right:20px;
	  width:56px;
	  height:56px;
	  background:var(--accent);
	  color:#fff; border-radius:50%;
	  display:flex; align-items:center;
	  justify-content:center; font-size:28px;
	  border:none; box-shadow:0 4px 12px rgba(37,99,235,0.4);
	  cursor:pointer;
	  z-index: 60;
	}
	
	/* Removes arrows from Chrome, Safari, Edge, and Opera */
	input::-webkit-outer-spin-button,
	input::-webkit-inner-spin-button {
	  -webkit-appearance: none;
	  margin: 0;
	}

	/* Removes arrows from Firefox */
	input[type=number] {
	  -moz-appearance: textfield;
    appearance: textfield;
	}
	
	/* Mobile: Stack everything in 1 column */
	@media screen and (max-width: 500px) {
	  .formGrid {
		grid-template-columns: 1fr;
	  }
	  .full {
		grid-column: span 1;
	  }
	}
	
    .multi-select-dropdown {
      position: relative;
      width: 100%;
      user-select: none;
    }
    
    #dropdownHeader {
      border: 1px solid var(--border);
      padding: 10px 15px;
      border-radius: 8px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      min-height: 42px;
      transition: border-color 0.2s;
	  box-sizing: border-box;
    }
	
	#selectedUnitsText, #dropdownHeader span:last-child {
	  pointer-events: none;
	}
    
    #dropdownHeader:hover {
      border-color: var(--accent);
    }
    
    #UnitContainer {
      display: none; /* Hidden by default */
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      z-index: 1001; /* Ensures it floats above other fields */
      padding: 12px;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

	.unit-tag {
	  display: inline-block;
	  background: #e0e7ff;
	  color: #4338ca;
	  font-size: 11px;
	  font-weight: 700;
	  padding: 1px 5px;
	  border-radius: 4px;
	  margin: 2px;
	  border: 1px solid #c7d2fe;
	  white-space: nowrap;
	}

	.unit-badge-wrapper {
	  display: flex;
	  flex-wrap: wrap;
	  gap: 3px;
	  width: 65px;
    max-width: 65px;
	}
  </style>
</head>
<body>

<header>
  <div class="headerInner">
    <h1>Torre KBR • Guests Information</h1>
    <a href="calendar.html" class="mainLink">Calendar</a>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <div id="syncStatus" class="sync-status">Initial Sync</div>
    <select id="sortSelect" onchange="resetPageAndFilter()">
      <option value="Date-asc" selected>Booking (Oldest)</option>
      <option value="Date-desc">Booking (Newest)</option>
    </select>
    <button class="btn-refresh" onclick="loadLedger()">🔄</button>
	
	<input type="text" id="searchInput" placeholder="Search..." onkeyup="debouncedSearch()">
  </div>

  <div class="ledger-wrap">
    <table id="ledgerTable">
      <thead>
        <tr>
          <th>Date</th>
		  <th>Name</th>
		  <th>Pax</th>
		  <th>Check-In</th>
		  <th>Check-Out</th>
		  <th>Unit(s)</th>
		  <th>DP</th>
		  <th>Balance</th>
		  <th>Total</th>
		  <th>M.O.P.</th>
		  <th>Contact</th>
		  <th>Remarks</th>
        </tr>
      </thead>
      <tbody id="ledgerBody">
        <tr><td colspan="11" style="text-align:center;padding:40px">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button id="prevBtn" class="btn-page" onclick="changePage(-1)">Prev</button>
    <span id="pageInfo" style="font-size: 13px; font-weight: 700; color: var(--muted);">Page 1</span>
    <button id="nextBtn" class="btn-page" onclick="changePage(1)">Next</button>
  </div>
</div>

<button class="fab" onclick="openModal(false)">+</button>

<div id="modalOverlay" class="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin:0 0 15px 0; font-size: 20px;">Add Record</h2>
    <input type="hidden" id="BookingID">
    <div class="formGrid">
      <div class="field">
	    <label>Check-In Date <span style="color:var(--danger)">*</span></label>
		<input type="date" id="Check-In" required onchange="updateAvailableUnits()">
	  </div>
      <div class="field">
	    <label>Check-Out Date <span style="color:var(--danger)">*</span></label>
		<input type="date" id="Check-Out" required onchange="updateAvailableUnits()">
	  </div>
      <div class="field full">
	    <label>Guest Name <span style="color:var(--danger)">*</span></label>
		<input type="text" id="Name" required>
	  </div>
      <div class="field">
	    <label>Unit(s) <span style="color:var(--danger)">*</span></label>
		<div class="multi-select-dropdown">
		  <div id="dropdownHeader" onclick="toggleUnitMenu(event)">
		    <span id="selectedUnitsText" style="font-size: 14px; color: var(--muted);">Select Units...</span>
			<span style="font-size: 10px;">▼</span>
		  </div>
		  <div id="UnitContainer" style="display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); z-index: 100; padding: 10px; grid-template-columns: repeat(2, 1fr); gap: 10px;"></div>
	    </div>
	  </div>
      <div class="field">
	    <label># of Pax</label><input type="text" id="# of Pax" placeholder="e.g. 2+1">
	  </div>
      <div class="field">
	    <label>Total</label><input type="number" min="0" step="0.01" placeholder="0" id="Total">
	  </div>
      <div class="field">
	    <label>DP</label><input type="number" min="0" step="0.01" placeholder="0" id="DP">
	  </div>
      <div class="field">
	    <label>Balance</label><input type="number" min="0" step="0.01" placeholder="0" id="Balance">
	  </div>
      <div class="field">
	    <label>M.O.P</label><input type="text" id="MOP"></div>
      <div class="field">
	    <label>Contact No.</label><input type="text" id="CP No.">
	  </div>
      <div class="field full">
	    <label>Remarks</label><input type="text" id="Remarks">
	  </div>
    </div>
    <div class="actions">
      <button id="deleteBtn" class="btn-del" style="display:none; margin-right:auto;" onclick="deleteEntry()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="saveBtn" class="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwGYX-3VWpoZoSkCfKURMnvBSBSsAfcwG7rKoKA9hGWGwlu1mR1LV-ZOkULvVSTOGFl7w/exec"; 
  const _k = atob("a2JyX3N1cGVyX3NlY3JldF8yMDI2");
  
  const UNITS = ["D1","D2","C1","C2","C3","B1","B2","A1","A2","RM A","RM B","RM C"];
  let RAW_RECORDS = [];
  let filteredRecords = [];
  let currentPage = 1;
  const rowsPerPage = 20;
  let searchTimer;

  // Helper function to solve timezone shift and timestamp bloat
  function formatDateSafe(val) {
    if(!val) return "";
    // 1. Strip timestamp
    let str = val.toString().split('T')[0];
    // 2. Replace hyphens with slashes to force local date interpretation
    let dateObj = new Date(str.replace(/-/g, '\/'));
    // 3. Return clean YYYY-MM-DD
    return isNaN(dateObj.getTime()) ? str : dateObj.toLocaleDateString('en-CA');
  }

  async function loadLedger() {
    const statusEl = document.getElementById("syncStatus");
    statusEl.className = "sync-status status-loading";
    statusEl.innerText = "Syncing...";
    
    try {
      const resp = await fetch(`${API_URL}?key=${_k}`);
      const res = await resp.json();
      if(res.ok) { 
        // Optimization: Create a hidden search index string for each row
        RAW_RECORDS = res.records.map(r => ({
          ...r, 
          _sIdx: Object.values(r).join(" ").toUpperCase() 
        })); 
        filterAndSort(); 
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Manila', hour: '2-digit', minute: '2-digit' });
        statusEl.className = "sync-status status-ok";
        statusEl.innerHTML = `Synced<br>${timeStr}`;
      }
    } catch(e) { statusEl.innerText = "Error"; }
  }

  // Optimization: Debounce prevents UI freeze while typing
  function debouncedSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(resetPageAndFilter, 300);
  }

  function filterAndSort() {
    let results = [...RAW_RECORDS];
    const search = document.getElementById("searchInput").value.toUpperCase();
    
    if(search) {
      // Changed from _searchIndex to _sIdx to match your loadLedger function
      results = results.filter(r => r._sIdx && r._sIdx.includes(search));
    }

    const sortVal = document.getElementById("sortSelect").value;
    const [key, order] = sortVal.split("-");
    
    results.sort((a, b) => {
      let valA = a[key] || ""; 
      let valB = b[key] || "";
      if (valA < valB) return order === "asc" ? -1 : 1;
      if (valA > valB) return order === "asc" ? 1 : -1;
      return 0;
    });

	filteredRecords = results;
	currentPage = 1;
    renderTable();
  }

  function renderTable() {
    const tbody = document.querySelector("#ledgerTable tbody");
    if (!tbody) return;
    tbody.innerHTML = "";
  
    let sourceData = [];
    if (typeof filteredRecords !== 'undefined' && filteredRecords.length > 0) {
      sourceData = filteredRecords;
    } else if (typeof RAW_RECORDS !== 'undefined') {
      sourceData = RAW_RECORDS;
    }
  
    if (sourceData.length === 0) {
      tbody.innerHTML = "<tr><td colspan='12' style='text-align:center; padding:20px;'>No records found.</td></tr>";
      return;
    }
  
    const totalPages = Math.ceil(sourceData.length / rowsPerPage);
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const paginatedData = sourceData.slice(start, end);
  
    paginatedData.forEach(r => {
      const tr = document.createElement("tr");
      
      // RESTORE: Click on row to edit
      tr.onclick = () => editByID(r["Booking ID"]);
      
      const cols = ["Date", "Name", "# of Pax", "Check-In", "Check-Out", "Unit", "DP", "Balance", "Total", "MOP", "CP No.", "Remarks"];
  
      cols.forEach(col => {
        const td = document.createElement("td");
        if (col === "Unit") {
          const unitStr = String(r[col] || "");
          const units = unitStr.split(",").map(u => u.trim()).filter(u => u !== "");
          if (units.length > 0) {
            const badgeWrapper = document.createElement("div");
            badgeWrapper.className = "unit-badge-wrapper";
            badgeWrapper.innerHTML = units.map(u => {
              const specialClass = u.startsWith("RM") ? "tag-RM" : "";
              return `<span class="unit-tag ${specialClass}">${u}</span>`;
            }).join("");
            td.appendChild(badgeWrapper);
          } else { td.innerText = "-"; }
        } else if (col === "Balance") {
          td.className = "bal";
          td.innerText = r[col] || "";
        } else {
          td.innerText = r[col] || "";
        }
        tr.appendChild(td);
      });
  
      tbody.appendChild(tr);
    });
  
    const pageInfo = document.getElementById("pageInfo");
    if (pageInfo) pageInfo.innerText = `Page ${currentPage} of ${totalPages || 1}`;
    
    const prevBtn = document.getElementById("prevBtn");
    if (prevBtn) prevBtn.disabled = (currentPage === 1);
    
    const nextBtn = document.getElementById("nextBtn");
    if (nextBtn) nextBtn.disabled = (currentPage >= totalPages || totalPages === 0);
  }
  
  function changePage(step) { currentPage += step; renderTable(); window.scrollTo(0,0); }
  function resetPageAndFilter() { currentPage = 1; filterAndSort(); }

  function editByID(id) {
    const r = RAW_RECORDS.find(item => item["Booking ID"] === id);
    if(!r) return;
    openModal(true);
	
    document.getElementById("modalTitle").innerText = "Edit Record";
    document.getElementById("BookingID").value = r["Booking ID"];
	
	//1. Handle Units (Split string into array)
	const unitString = r["Unit"] || "";
	const selectedArray = unitString.split(",").map(u => u.trim());
	
	//2. Populate standard fields
	const fields = ["Name","# of Pax","Check-In","Check-Out","DP","Balance","Total","MOP","CP No.","Remarks"];
	fields.forEach(f => {
      const el = document.getElementById(f);
      if (el) el.value = r[f] || "";
	});
	
    //3. Update Unit Checkboxes
	updateAvailableUnits(selectedArray);
    
    document.getElementById("deleteBtn").style.display = "block";
    document.getElementById("saveBtn").innerText = "Update";
  }

  async function saveEntry() {
    const checkInVal = document.getElementById("Check-In").value;
    const checkOutVal = document.getElementById("Check-Out").value;
	//Gather Selected Units
	const selectedUnits = Array.from(document.querySelectorAll('input[name="unitCb"]:checked'))
                             .map(cb => cb.value);
    
    // Mandatory Field Validation
    const requiredFields = ["Check-In","Check-Out","Name"];
    for(let id of requiredFields) {
      if(!document.getElementById(id).value.trim()){
        alert("Please fill in: " + id); return;
      }
    }
	
	if (selectedUnits.length === 0) {
	  alert("Please select at least one Unit.");
	  return;
	}
	
    if (new Date(checkOutVal) <= new Date(checkInVal)) {
      alert("Invalid Dates: Check-Out must be after Check-In."); return;
    }
	
    // Conflict check logic
    const currentId = document.getElementById("BookingID").value;
    const newIn = new Date(checkInVal).getTime();
    const newOut = new Date(checkOutVal).getTime();
	
    const conflict = RAW_RECORDS.find(r => {
      if (currentId && r["Booking ID"] === currentId) return false;
      const existIn = new Date(formatDateSafe(r["Check-In"])).getTime();
      const existOut = new Date(formatDateSafe(r["Check-Out"])).getTime();
	  
	  // Check if dates overlap
	  if (newIn < existOut && newOut > existIn) {
	    //Split units into array
		const existingUnits = String(r["Unit"]).split(",").map(u => u.trim());
		//Check if any of the selected units are inside existingUnits array
		return selectedUnits.some(u => existingUnits.includes(u));
	  }
      return false;
    });
	
    if (conflict) {
      alert(`CONFLICT: Unit ${newUnit} is booked for ${conflict["Name"]}.`); return;
    }
	
    const btn = document.getElementById("saveBtn");
    btn.innerText = "..."; btn.disabled = true;
    
    const entryData = { "Booking ID": currentId || "BK-" + Date.now() };
    if (!currentId) {
      entryData["Date"] = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila' }).format(new Date());
    }
	
	//Standard fields
    ["Name","# of Pax","Check-In","Check-Out","DP","Balance","Total","MOP","CP No.","Remarks"].forEach(f => {
      entryData[f] = document.getElementById(f).value;
    });
	
	//Manually set "Unit" field comma-separated string
	entryData["Unit"] = selectedUnits.join(",");
    
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: _k, data: entryData }) });
      const result = await resp.json();
      if (result.ok) { 
	    closeModal();
		alert("Saved successfully!");
		loadLedger();
	  } 
      else alert("Oops! " + result.error);
    } catch(e) { alert("Network Error."); }
    btn.innerText = "Save";
	btn.disabled = false;
  }
  
  function updateAvailableUnits(alreadySelected = []) {
    const cIn = document.getElementById("Check-In");
    const cOut = document.getElementById("Check-Out");
    const currentId = document.getElementById("BookingID").value;
	
    if (cIn.value) {
      let nextDay = new Date(cIn.value);
      nextDay.setDate(nextDay.getDate() + 1);
      cOut.min = nextDay.toISOString().split("T")[0];
    }
	
    if (!cIn.value || !cOut.value) {
      renderUnitOptions(UNITS, alreadySelected);
	  return;
    }
	
    const nIn = new Date(cIn.value).getTime();
    const nOut = new Date(cOut.value).getTime();
	
    const taken = [];
	RAW_RECORDS.forEach(r => {
	  if (currentId && String(r["Booking ID"]) === currentId) return;
	  const eIn = new Date(formatDateSafe(r["Check-In"])).getTime();
	  const eOut = new Date(formatDateSafe(r["Check-Out"])).getTime();
	  
	  if (nIn < eOut && nOut > eIn) {
	    const units = String(r["Unit"] || "").split(",").map(u => u.trim());
		units.forEach(u => { if(!taken.includes(u)) taken.push(u); });
	  }
	});
	
    const available = UNITS.filter(u => !taken.includes(u));
	renderUnitOptions(available, alreadySelected);
  }
  
  // Helper to keep the code clean
  function renderUnitOptions(availableList, selectedList = []) {
    const container = document.getElementById("UnitContainer");
    if (!container) return;
    container.innerHTML = "";
    
    UNITS.forEach(u => {
      const isAvailable = availableList.includes(u);
      const isSelected = selectedList.includes(u);
    
      const div = document.createElement("div");
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.gap = "8px";
      div.style.opacity = (isAvailable || isSelected) ? "1" : "0.3";
    
      div.innerHTML = `
	    <input type="checkbox" name="unitCb" value="${u}" 
	    onchange="updateHeaderText()" 
	    ${isSelected ? 'checked' : ''} 
	    ${(!isAvailable && !isSelected) ? 'disabled' : ''} 
	    style="width:18px; height:18px; cursor:pointer;">
	    <label style="margin:0; font-size:13px; color:var(--text); cursor:pointer; text-transform:none;">${u}</label>
	  `;
      container.appendChild(div);
    });
	updateHeaderText();
  }

  async function deleteEntry() {
    if(!confirm("Are you sure you want to delete?")) return;
    const bId = document.getElementById("BookingID").value;
    try {
      await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: _k, data: { "Booking ID": bId, "_delete": true } }) });
      closeModal(); loadLedger();
    } catch(e) { alert("Error."); }
  }

  function toggleUnitMenu(event) {
    if (event) {
	  event.preventDefault();
	  event.stopPropagation();
    }
	
	const container = document.getElementById("UnitContainer");
	const isHidden = window.getComputedStyle(container).display === "none";
	container.style.display = isHidden ? "grid" : "none";
  }
  
  window.onclick = function(event) {
    const container = document.getElementById("UnitContainer");
    const header = document.getElementById("dropdownHeader");
	
	if (container && container.style.display === "grid") {
      // If we click outside both the header and the list, close it
      if (!header.contains(event.target) && !container.contains(event.target)) {
        container.style.display = "none";
      }
    }
  };
  
  function updateHeaderText() {
    const selected = Array.from(document.querySelectorAll('input[name="unitCb"]:checked'))
                          .map(cb => cb.value);
    const headerText = document.getElementById("selectedUnitsText");
    if (selected.length > 0) {
      headerText.innerText = selected.join(", ");
      headerText.style.color = "var(--text)";
    } else {
      headerText.innerText = "Select Units...";
      headerText.style.color = "var(--muted)";
    }
  }

  function openModal(isEdit) { 
    document.getElementById("modalOverlay").style.display = "flex"; 
    document.body.style.overflow = "hidden";
    if(!isEdit) {
      document.getElementById("modalTitle").innerText = "Add Record";
	  document.getElementById("BookingID").value = "";
	  renderUnitOptions(UNITS);
    } else {
	  updateAvailableUnits();
	}
  }

  function closeModal() { 
    document.getElementById("modalOverlay").style.display = "none"; 
    document.body.style.overflow = "auto";
    
    const delBtn = document.getElementById("deleteBtn");
    if(delBtn) {
      delBtn.style.display = "none";
      delBtn.innerText = "Delete";
      delBtn.disabled = false;
    }

    const saveBtn = document.getElementById("saveBtn");
    if(saveBtn) {
      saveBtn.innerText = "Save";
      saveBtn.disabled = false;
    }

    document.querySelectorAll(".modal input, .modal select").forEach(i => {
      i.value = "";
      if(i.tagName === "SELECT") i.selectedIndex = 0; // Resets dropdown to "Select Unit..."
    });
	renderUnitOptions(UNITS);
	document.getElementById("Check-Out").min = "";
	document.getElementById("UnitContainer").style.display = "none";
    document.getElementById("selectedUnitsText").innerText = "Select Units...";
  }
  
  loadLedger();
  setInterval(loadLedger, 45000); // Background sync every 45s
</script>
</body>
</html>
