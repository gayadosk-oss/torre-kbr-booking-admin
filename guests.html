<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Torre KBR • Guest Ledger</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --accent:#2563eb; --danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    
    header{padding:16px; border-bottom:1px solid var(--border); background:#fff; position:sticky; top:0; z-index:50}
    .headerInner{max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between}
    h1{margin:0; font-size:20px; font-weight:800}
    
    .mainLink{
      text-decoration:none; background:#0f172a; color:#fff; 
      padding:8px 16px; border-radius:8px; font-weight:600; font-size:14px;
    }

    .wrap{max-width:1400px; margin:0 auto; padding:20px}
    
    .toolbar{display:flex; gap:12px; align-items:center; background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; box-shadow:var(--shadow); margin-bottom:20px}
    input, select, .btn-refresh{border:1px solid var(--border); border-radius:8px; padding:12px; font-size:16px; outline:none; background:#fff}
    .btn-refresh{cursor:pointer; font-weight:600;}

    .ledger-wrap { background:#fff; border-radius:12px; border:1px solid var(--border); overflow-x:auto; box-shadow:var(--shadow); }
    table { width:100%; border-collapse:collapse; min-width:1200px; font-size:13px; }
    th { background:#f8fafc; color:var(--accent); padding:14px; text-align:left; border-bottom:2px solid var(--border); font-weight:800; text-transform:uppercase; }
    td { padding:14px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
    tbody tr:hover { background: #f8fafc; cursor: pointer; }
    .bal { color: var(--danger); font-weight: 800; }

    /* MODAL STYLES */
    .modalOverlay{position:fixed; inset:0; background:rgba(15, 23, 42, 0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:10px; backdrop-filter: blur(4px)}
    .modal{background:#fff; width:100%; max-width:600px; border-radius:16px; padding:20px; max-height:95vh; overflow-y:auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);}
    
    .formGrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .full{ grid-column: span 2; }
    label{ display:block; font-size:11px; font-weight:900; color:var(--muted); margin-bottom:4px; text-transform:uppercase; }
    .field input, .field select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 16px; }

    .actions{margin-top:24px; display:flex; flex-wrap: wrap; justify-content:flex-end; gap:12px; border-top:1px solid var(--border); padding-top:20px}
    .btn-save{background:var(--accent); color:#fff; border:none; padding:12px 24px; border-radius:8px; font-weight:600; cursor:pointer;}
    .btn-cancel{background:#f1f5f9; border:none; padding:12px 20px; border-radius:8px; font-weight:600; cursor:pointer;}
    .btn-del{color:var(--danger); background:none; border:none; font-weight:600; cursor:pointer;}

    /* MOBILE SPECIFIC FIXES */
    @media (max-width: 600px) {
      .headerInner h1 { font-size: 16px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .formGrid { grid-template-columns: 1fr; }
      .full { grid-column: span 1; }
      .modal { padding: 16px; }
      .actions { flex-direction: column-reverse; }
      .btn-save, .btn-cancel { width: 100%; }
      .btn-del { width: 100%; text-align: center; margin-bottom: 10px; }
    }

    .fab { position:fixed; bottom:24px; right:24px; width:60px; height:60px; background:var(--accent); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; border:none; box-shadow:0 4px 15px rgba(37,99,235,0.4); cursor:pointer; z-index: 60;}
  </style>
</head>
<body>

<header>
  <div class="headerInner">
    <h1>Guest Ledger</h1>
    <a href="index.html" class="mainLink">Main Menu</a>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search guests..." style="flex:1" onkeyup="filterAndSort()">
    
    <select id="sortSelect" onchange="filterAndSort()">
      <option value="Check-In-desc">Newest Check-In First</option>
      <option value="Check-In-asc">Oldest Check-In First</option>
      <option value="Name-asc">Name (A-Z)</option>
      <option value="Unit-asc">Unit Number</option>
      <option value="Balance-desc">Highest Balance</option>
    </select>

    <button class="btn-refresh" onclick="loadLedger()">🔄 Refresh</button>
  </div>

  <div class="ledger-wrap">
    <table id="ledgerTable">
      <thead>
        <tr>
          <th>Date</th><th>Name</th><th>Pax</th><th>Check-In</th><th>Unit</th><th>DP</th><th>Balance</th><th>Total</th><th>MOP</th><th>Contact</th><th>Remarks</th>
        </tr>
      </thead>
      <tbody id="ledgerBody">
        <tr><td colspan="11" style="text-align:center;padding:40px">Loading Ledger...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div id="modalOverlay" class="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin-top:0">Add Guest Record</h2>
    <input type="hidden" id="BookingID">
    <div class="formGrid">
      <div class="field"><label>Booking Date</label><input type="date" id="Date"></div>
      <div class="field"><label>Check-In Date</label><input type="date" id="Check-In"></div>
      <div class="field full"><label>Guest Name</label><input id="Name"></div>
      <div class="field"><label>Unit</label><select id="Unit"></select></div>
      <div class="field"><label># of Pax</label><input type="text" id="# of Pax"></div>
      <div class="field"><label>Total</label><input type="number" id="Total"></div>
      <div class="field"><label>DP</label><input type="number" id="DP"></div>
      <div class="field"><label>Balance</label><input type="number" id="Balance"></div>
      <div class="field"><label>M.O.P</label><input id="MOP"></div>
      <div class="field full"><label>Contact No.</label><input id="CP No."></div>
      <div class="field full"><label>Remarks</label><input id="Remarks"></div>
    </div>
    <div class="actions">
      <button id="deleteBtn" class="btn-del" style="display:none; margin-right:auto;" onclick="deleteEntry()">Delete Record</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="saveBtn" class="btn-save" onclick="saveEntry()">Save Ledger</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzv3aXkkAihx0hiR5tFx3VlabaYpLiAdqaysldk-0RwcyMNTW_1qfbANudn9FkSIllCdQ/exec"; 
  const API_KEY = "kbr_super_secret_2026";
  const UNITS = ["D1","D2","C1","C2","C3","B1","B2","A1","A2","ROOM A","ROOM B","ROOM C"];
  let RAW_RECORDS = [];

  const uSelect = document.getElementById("Unit");
  UNITS.forEach(u => uSelect.add(new Option(u, u)));

  async function loadLedger() {
    try {
      const resp = await fetch(API_URL);
      const res = await resp.json();
      if(res.ok) {
        RAW_RECORDS = res.records;
        filterAndSort();
      }
    } catch(e) { console.error("Load failed", e); }
  }

  function renderTable(records) {
    document.getElementById("ledgerBody").innerHTML = records.map((r) => {
      const originalIndex = RAW_RECORDS.findIndex(raw => raw["Booking ID"] === r["Booking ID"]);
      return `
        <tr onclick="editRecord(${originalIndex})">
          <td>${r["Date"]}</td>
          <td style="font-weight:bold">${r["Name"]}</td>
          <td>${r["# of Pax"]}</td>
          <td>${r["Check-In"]}</td>
          <td style="color:var(--accent);font-weight:bold">${r["Unit"]}</td>
          <td>${r["DP"]}</td>
          <td class="${parseFloat(r["Balance"] || 0) > 0 ? 'bal' : ''}">${r["Balance"]}</td>
          <td>${r["Total"]}</td>
          <td>${r["MOP"]}</td>
          <td>${r["CP No."]}</td>
          <td style="color:var(--muted); font-style:italic;">${r["Remarks"] || ""}</td>
        </tr>
      `;
    }).join('');
  }

  function filterAndSort() {
    let filtered = [...RAW_RECORDS];
    const search = document.getElementById("searchInput").value.toUpperCase();
    if(search) filtered = filtered.filter(r => Object.values(r).join(" ").toUpperCase().includes(search));

    const [key, order] = document.getElementById("sortSelect").value.split("-");
    filtered.sort((a, b) => {
      let valA = a[key] || "";
      let valB = b[key] || "";
      if(key === "Balance") { valA = parseFloat(valA) || 0; valB = parseFloat(valB) || 0; }
      if (valA < valB) return order === "asc" ? -1 : 1;
      if (valA > valB) return order === "asc" ? 1 : -1;
      return 0;
    });
    renderTable(filtered);
  }

  function editRecord(index) {
    const r = RAW_RECORDS[index];
    document.getElementById("modalTitle").innerText = "Edit Record";
    document.getElementById("BookingID").value = r["Booking ID"];
    const fields = ["Date","Name","# of Pax","Check-In","Unit","DP","Balance","Total","MOP","CP No.","Remarks"];
    fields.forEach(f => { document.getElementById(f).value = r[f] || ""; });
    document.getElementById("deleteBtn").style.display = "block";
    openModal();
  }

  async function saveEntry() {
    const bId = document.getElementById("BookingID").value || "BK-" + Date.now();
    const fields = ["Date","Name","# of Pax","Check-In","Unit","DP","Balance","Total","MOP","CP No.","Remarks"];
    const entryData = { "Booking ID": bId };
    fields.forEach(f => entryData[f] = document.getElementById(f).value);
    const btn = document.getElementById("saveBtn");
    btn.innerText = "Saving...";
    btn.disabled = true;
    try {
      await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: API_KEY, data: entryData }) });
      closeModal();
      loadLedger();
    } catch(e) { alert("Save failed."); }
    btn.innerText = "Save Ledger";
    btn.disabled = false;
  }

  async function deleteEntry() {
    if(!confirm("Permanently delete this record?")) return;
    const bId = document.getElementById("BookingID").value;
    const btn = document.getElementById("deleteBtn");
    btn.innerText = "Deleting...";
    btn.disabled = true;
    try {
      await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: API_KEY, data: { "Booking ID": bId, "_delete": true } }) });
      closeModal();
      loadLedger();
    } catch(e) { alert("Delete failed."); }
  }

  function openModal() { document.getElementById("modalOverlay").style.display="flex"; }
  function closeModal() { 
    document.getElementById("modalOverlay").style.display="none"; 
    document.getElementById("BookingID").value = "";
    document.getElementById("deleteBtn").style.display = "none";
    document.getElementById("modalTitle").innerText = "Add Guest Record";
    document.querySelectorAll(".modal input").forEach(i => i.value = "");
  }
  
  loadLedger();
</script>
</body>
</html>
