<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Torre KBR • Guests Information</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --accent:#2563eb; --danger:#dc2626; --success:#059669;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
    
    header{padding:16px; border-bottom:1px solid var(--border); background:#fff; position:sticky; top:0; z-index:50}
    .headerInner{max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between}
    h1{margin:0; font-size:18px; font-weight:800}
    
    .mainLink{ text-decoration:none; background:#0f172a; color:#fff; padding:8px 16px; border-radius:8px; font-weight:600; font-size:13px; }

    .wrap{max-width:1400px; margin:0 auto; padding:15px}
    
    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      justify-content: start;
    }
	
    .btn-refresh {
	  cursor: pointer;
	  height: 40px;
	  width: 40px; /* Force it to be square */
	  border: 1px solid var(--border);
	  border-radius: 8px;
	  background: #fff;
	  font-size: 18px;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  padding: 0; /* Remove padding that might stretch it */
	  justify-self: end;
	}
	
	#searchInput { 
	  grid-column: span 3; /* Forces search to take up its own row below the others */
	  width: 100%; 
	  border: 1px solid var(--border); 
	  border-radius: 8px; 
	  padding: 12px; 
	  font-size: 16px; /* Larger font for better mobile tap target */
	  outline: none; 
	  background: #f8fafc; /* Slight tint to distinguish it from the top row */
	}

    #sortSelect {
	  width: 100%;
	  max-width: 200px;
	  border:1px solid var(--border);
	  border-radius:8px; padding:10px;
	  font-size:14px;
	  outline:none;
	  cursor: pointer;
	  background: #fff;
	}

    .sync-status { 
      font-size: 9px; color: #fff; font-weight: 800; text-transform: uppercase; 
      background: var(--muted); padding: 6px 10px; border-radius: 6px; 
      text-align: center; line-height: 1.1; min-width: 90px; white-space: nowrap;
    }
    .status-ok { background: var(--success) !important; }
    .status-loading { background: var(--accent) !important; animation: pulse 1s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    .ledger-wrap {
	  background:#fff;
	  border-radius:12px;
	  border:1px solid var(--border);
	  overflow-x:auto;
	  box-shadow:var(--shadow);
	  contain: content; /* Efficiency: Limits layout calculations */
	}
	
    table {
	  width:100%;
	  border-collapse:collapse;
	  min-width:1100px;
	  font-size:13px;
	}
	
    th { background:#f8fafc; color:var(--accent); padding:12px; text-align:left; border-bottom:2px solid var(--border); font-weight:800; text-transform:uppercase; position: sticky; top: 0; z-index: 5; }
    td { padding:12px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
    tbody tr:hover { background: #f8fafc; cursor: pointer; }
    .bal { color: var(--danger); font-weight: 800; }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; padding-bottom: 80px; }
    .btn-page { background: #fff; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

    .modalOverlay{
	  position:fixed;
	  inset:0;
	  background:rgba(15, 23, 42, 0.6);
	  display:none;
	  justify-content:center;
	  align-items: center;
	  z-index: 100;
	  padding: 15px;
	  backdrop-filter: blur(4px);
	  overflow-y: auto;
	  overflow: hidden;
	}
	
    .modal{
	  background:#fff;
	  width: 95%;
	  max-width: 550px;
	  border-radius:16px;
	  padding:25px;
	  margin: 0;
	  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
	  max-height: 90vh;
	  overflow-y: auto;
	  position: relative;
	  overflow-x: hidden;
	}
    
	.formGrid{ 
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap:15px;
		width: 100%;
		box-sizing: border-box;
	}
	
	.field {
	  display: flex;
	  flex-direction: column;
	  width: 100%;
	}
	
    .full{
	  grid-column: span 2;
	}
	
	/* Makes the date fields narrower and more compact */
	.field input[type="date"] {
	  max-width: 200px; /* Limits the width so they don't look too long */
	  padding: 10px;     /* Reduces internal spacing */
	  font-size: 16px;  /* Slightly smaller text to match the smaller box */
	}
		
    label{
	  display:block;
	  font-size:10px;
	  font-weight:900;
	  color:var(--muted);
	  margin-bottom:4px;
	  text-transform:uppercase;
	}
	
    .field input, .field select {
	  width: 100%;
	  border: 1px solid var(--border);
	  border-radius: 8px;
	  padding: 10px;
	  font-size: 16px;
	  background: #fff;
	  max-width: 100%;
	  box-sizing: border-box;
	}

    .actions{
	  margin-top:20px;
	  display:flex;
	  flex-wrap: wrap;
	  justify-content:flex-end;
	  gap:10px;
	  border-top:1px solid var(--border);
	  padding-top:15px
	}
	
    .btn-save{
	  background:var(--accent);
	  color:#fff;
	  border:none;
	  padding:12px 20px;
	  border-radius:8px;
	  font-weight:600;
	  cursor:pointer;
	}
	
    .btn-cancel{
	  background:#f1f5f9;
	  border:none;
	  padding:12px 15px;
	  border-radius:8px;
	  font-weight:600;
	  cursor:pointer;
	}
	
    .btn-del{
	  color: #fff;
	  background: #e74c3c;
	  border:none;
	  padding:12px 20px;
	  border-radius:8px;
	  font-weight:600;
	  cursor:pointer;
	}

    .fab {
	  position:fixed;
	  bottom:20px;
	  right:20px;
	  width:56px;
	  height:56px;
	  background:var(--accent);
	  color:#fff; border-radius:50%;
	  display:flex; align-items:center;
	  justify-content:center; font-size:28px;
	  border:none; box-shadow:0 4px 12px rgba(37,99,235,0.4);
	  cursor:pointer;
	  z-index: 60;
	}
	
	/* Removes arrows from Chrome, Safari, Edge, and Opera */
	input::-webkit-outer-spin-button,
	input::-webkit-inner-spin-button {
	  -webkit-appearance: none;
	  margin: 0;
	}

	/* Removes arrows from Firefox */
	input[type=number] {
	  -moz-appearance: textfield;
	}
	
	/* Mobile: Stack everything in 1 column */
	@media screen and (max-width: 500px) {
	  .formGrid {
		grid-template-columns: 1fr;
	  }
	  .full {
		grid-column: span 1;
	  }
	}
  </style>
</head>
<body>

<header>
  <div class="headerInner">
    <h1>Torre KBR • Guests Information</h1>
    <a href="calendar.html" class="mainLink">Calendar</a>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <div id="syncStatus" class="sync-status">Initial Sync</div>
    <select id="sortSelect" onchange="resetPageAndFilter()">
      <option value="Date-asc" selected>Booking (Oldest)</option>
      <option value="Date-desc">Booking (Newest)</option>
    </select>
    <button class="btn-refresh" onclick="loadLedger()">🔄</button>
	
	<input type="text" id="searchInput" placeholder="Search..." onkeyup="debouncedSearch()">
  </div>

  <div class="ledger-wrap">
    <table id="ledgerTable">
      <thead>
        <tr>
          <th>Date</th>
		  <th>Name</th>
		  <th>Pax</th>
		  <th>Check-In</th>
		  <th>Check-Out</th>
		  <th>Unit</th>
		  <th>DP</th>
		  <th>Balance</th>
		  <th>Total</th>
		  <th>M.O.P.</th>
		  <th>Contact</th>
		  <th>Remarks</th>
        </tr>
      </thead>
      <tbody id="ledgerBody">
        <tr><td colspan="11" style="text-align:center;padding:40px">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button id="prevBtn" class="btn-page" onclick="changePage(-1)">Prev</button>
    <span id="pageInfo" style="font-size: 13px; font-weight: 700; color: var(--muted);">Page 1</span>
    <button id="nextBtn" class="btn-page" onclick="changePage(1)">Next</button>
  </div>
</div>

<button class="fab" onclick="openModal(false)">+</button>

<div id="modalOverlay" class="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin:0 0 15px 0; font-size: 20px;">Add Record</h2>
    <input type="hidden" id="BookingID">
    <div class="formGrid">
      <div class="field"><label>Check-In Date <span style="color:var(--danger)">*</span></label><input type="date" id="Check-In" required onchange="updateAvailableUnits()"></div>
      <div class="field"><label>Check-Out Date <span style="color:var(--danger)">*</span></label><input type="date" id="Check-Out" required onchange="updateAvailableUnits()"></div>
      <div class="field full"><label>Guest Name <span style="color:var(--danger)">*</span></label><input type="text" id="Name" required></div>
      <div class="field"><label>Unit <span style="color:var(--danger)">*</span></label><select id="Unit" required></select></div>
      <div class="field"><label># of Pax</label><input type="text" id="# of Pax" placeholder="e.g. 2+1"></div>
      <div class="field"><label>Total</label><input type="number" min="0" step="0.01" placeholder="0" id="Total"></div>
      <div class="field"><label>DP</label><input type="number" min="0" step="0.01" placeholder="0" id="DP"></div>
      <div class="field"><label>Balance</label><input type="number" min="0" step="0.01" placeholder="0" id="Balance"></div>
      <div class="field"><label>M.O.P</label><input type="text" id="MOP"></div>
      <div class="field"><label>Contact No.</label><input type="text" id="CP No."></div>
      <div class="field full"><label>Remarks</label><input type="text" id="Remarks"></div>
    </div>
    <div class="actions">
      <button id="deleteBtn" class="btn-del" style="display:none; margin-right:auto;" onclick="deleteEntry()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="saveBtn" class="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzv3aXkkAihx0hiR5tFx3VlabaYpLiAdqaysldk-0RwcyMNTW_1qfbANudn9FkSIllCdQ/exec"; 
  const _k = atob("a2JyX3N1cGVyX3NlY3JldF8yMDI2");
  
  const UNITS = ["D1","D2","C1","C2","C3","B1","B2","A1","A2","RM A","RM B","RM C"];
  let RAW_RECORDS = [];
  let FILTERED_RECORDS = [];
  let currentPage = 1;
  const recordsPerPage = 20;
  let searchTimer;

  const uSelect = document.getElementById("Unit");
  uSelect.add(new Option("Select Unit...", ""));
  uSelect.options[0].disabled = true;
  uSelect.options[0].selected = true;
  UNITS.forEach(u => uSelect.add(new Option(u, u)));

  // Helper function to solve timezone shift and timestamp bloat
  function formatDateSafe(val) {
    if(!val) return "";
    // 1. Strip timestamp
    let str = val.toString().split('T')[0];
    // 2. Replace hyphens with slashes to force local date interpretation
    let dateObj = new Date(str.replace(/-/g, '\/'));
    // 3. Return clean YYYY-MM-DD
    return isNaN(dateObj.getTime()) ? str : dateObj.toLocaleDateString('en-CA');
  }

  async function loadLedger() {
    const statusEl = document.getElementById("syncStatus");
    statusEl.className = "sync-status status-loading";
    statusEl.innerText = "Syncing...";
    
    try {
      const resp = await fetch(`${API_URL}?key=${_k}`);
      const res = await resp.json();
      if(res.ok) { 
        // Optimization: Create a hidden search index string for each row
        RAW_RECORDS = res.records.map(r => ({
          ...r, 
          _sIdx: Object.values(r).join(" ").toUpperCase() 
        })); 
        filterAndSort(); 
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { timeZone: 'Asia/Manila', hour: '2-digit', minute: '2-digit' });
        statusEl.className = "sync-status status-ok";
        statusEl.innerHTML = `Synced<br>${timeStr}`;
      }
    } catch(e) { statusEl.innerText = "Error"; }
  }

  // Optimization: Debounce prevents UI freeze while typing
  function debouncedSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(resetPageAndFilter, 300);
  }

  function filterAndSort() {
    let results = [...RAW_RECORDS];
    const search = document.getElementById("searchInput").value.toUpperCase();
    
    if(search) {
      // Changed from _searchIndex to _sIdx to match your loadLedger function
      results = results.filter(r => r._sIdx && r._sIdx.includes(search));
    }

    const sortVal = document.getElementById("sortSelect").value;
    const [key, order] = sortVal.split("-");
    
    results.sort((a, b) => {
      let valA = a[key] || ""; 
      let valB = b[key] || "";
      if (valA < valB) return order === "asc" ? -1 : 1;
      if (valA > valB) return order === "asc" ? 1 : -1;
      return 0;
    });

    FILTERED_RECORDS = results;
    renderTable();
  }

  function renderTable() {
    const body = document.getElementById("ledgerBody");
    const totalPages = Math.ceil(FILTERED_RECORDS.length / recordsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * recordsPerPage;
    const pageData = FILTERED_RECORDS.slice(start, start + recordsPerPage);
  
    // Optimization: Build string then update DOM once
    let rows = "";
    pageData.forEach(r => {
      const hasBalance = parseFloat(r["Balance"] || 0) > 0;
      rows += `
        <tr onclick="editByID('${r["Booking ID"]}')">
          <td>${formatDateSafe(r["Date"])}</td>
          <td style="font-weight:bold">${r["Name"] || ""}</td>
          <td>${r["# of Pax"] || ""}</td>
          <td>${formatDateSafe(r["Check-In"])}</td>
          <td>${formatDateSafe(r["Check-Out"])}</td>
          <td style="color:var(--accent);font-weight:bold">${r["Unit"] || ""}</td>
          <td>${r["DP"] || ""}</td>
          <td class="${hasBalance ? 'bal' : ''}">${r["Balance"] || ""}</td>
          <td>${r["Total"] || ""}</td>
          <td>${r["MOP"] || ""}</td>
          <td>${r["CP No."] || ""}</td>
          <td style="color:var(--muted); font-style:italic;">${r["Remarks"] || ""}</td>
        </tr>`;
    });
  
    body.innerHTML = rows || '<tr><td colspan="12" style="text-align:center;padding:40px">No Records</td></tr>';
    document.getElementById("pageInfo").innerText = `Page ${currentPage} / ${totalPages}`;
    document.getElementById("prevBtn").disabled = (currentPage === 1);
    document.getElementById("nextBtn").disabled = (currentPage === totalPages);
  }
  
  function changePage(step) { currentPage += step; renderTable(); window.scrollTo(0,0); }
  function resetPageAndFilter() { currentPage = 1; filterAndSort(); }

  function editByID(id) {
    const r = RAW_RECORDS.find(item => item["Booking ID"] === id);
    if(!r) return;
    
    document.getElementById("modalTitle").innerText = "Edit Record";
    document.getElementById("BookingID").value = r["Booking ID"];
    document.getElementById("Name").value = r["Name"] || "";
    document.getElementById("# of Pax").value = r["# of Pax"] || "";
    document.getElementById("Check-In").value = formatDateSafe(r["Check-In"]);
    document.getElementById("Check-Out").value = formatDateSafe(r["Check-Out"]);
    document.getElementById("Unit").value = r["Unit"] || "";
    document.getElementById("Total").value = r["Total"] || "";
    document.getElementById("DP").value = r["DP"] || "";
    document.getElementById("Balance").value = r["Balance"] || "";
    document.getElementById("MOP").value = r["MOP"] || "";
    document.getElementById("CP No.").value = r["CP No."] || "";
    document.getElementById("Remarks").value = r["Remarks"] || "";
    
    document.getElementById("deleteBtn").style.display = "block";
    document.getElementById("saveBtn").innerText = "Update";
    openModal(true); 
  }

  async function saveEntry() {
    const checkInVal = document.getElementById("Check-In").value;
    const checkOutVal = document.getElementById("Check-Out").value;
    
    // Mandatory Field Validation
    const requiredFields = ["Check-In","Check-Out","Name","Unit"];
    for(let id of requiredFields) {
      if(!document.getElementById(id).value.trim()){
        alert("Please fill in: " + id); return;
      }
    }
	
    if (new Date(checkOutVal) <= new Date(checkInVal)) {
      alert("Invalid Dates: Check-Out must be after Check-In."); return;
    }
	
    // Conflict check logic
    const currentId = document.getElementById("BookingID").value;
    const newUnit = document.getElementById("Unit").value;
    const newIn = new Date(checkInVal).getTime();
    const newOut = new Date(checkOutVal).getTime();
	
    const conflict = RAW_RECORDS.find(r => {
      if (currentId && r["Booking ID"] === currentId) return false;
      const existIn = new Date(formatDateSafe(r["Check-In"])).getTime();
      const existOut = new Date(formatDateSafe(r["Check-Out"])).getTime();
      return newUnit === r["Unit"] && newIn < existOut && newOut > existIn;
    });
	
    if (conflict) {
      alert(`CONFLICT: Unit ${newUnit} is booked for ${conflict["Name"]}.`); return;
    }
	
    const btn = document.getElementById("saveBtn");
    btn.innerText = "..."; btn.disabled = true;
    
    const entryData = { "Booking ID": currentId || "BK-" + Date.now() };
    if (!currentId) {
      entryData["Date"] = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila' }).format(new Date());
    }
    ["Name","# of Pax","Check-In","Check-Out","Unit","DP","Balance","Total","MOP","CP No.","Remarks"].forEach(f => {
      entryData[f] = document.getElementById(f).value;
    });
    
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: _k, data: entryData }) });
      const result = await resp.json();
      if (result.ok) { 
	    closeModal();
		alert("Saved successfully!");
		loadLedger();
	  } 
      else alert("Oops! " + result.error);
    } catch(e) { alert("Network Error."); }
    btn.innerText = "Save";
	btn.disabled = false;
  }
  
  function updateAvailableUnits() {
    const cIn = document.getElementById("Check-In");
    const cOut = document.getElementById("Check-Out");
    const uSel = document.getElementById("Unit");
    const currentId = document.getElementById("BookingID").value;
	
    if (cIn.value) {
      let nextDay = new Date(cIn.value);
      nextDay.setDate(nextDay.getDate() + 1);
      cOut.min = nextDay.toISOString().split("T")[0];
    }
	
    if (!cIn.value || !cOut.value) {
      renderUnitDropdown(UNITS); return;
    }
	
    const nIn = new Date(cIn.value).getTime();
    const nOut = new Date(cOut.value).getTime();
    const taken = RAW_RECORDS.filter(r => {
      if (currentId && r["Booking ID"] === currentId) return false;
      const eIn = new Date(formatDateSafe(r["Check-In"])).getTime();
      const eOut = new Date(formatDateSafe(r["Check-Out"])).getTime();
      return (nIn < eOut && nOut > eIn);
    }).map(r => r["Unit"]);
	
    const available = UNITS.filter(u => !taken.includes(u));
    const saved = uSel.value;
    renderUnitDropdown(available);
    if (available.includes(saved)) uSel.value = saved;
  }
  
  // Helper to keep the code clean
  function renderUnitDropdown(list) {
    const uSelect = document.getElementById("Unit");
    uSelect.innerHTML = '<option value="" disabled selected>Select Unit...</option>';
    list.forEach(u => uSelect.add(new Option(u, u)));
  }

  async function deleteEntry() {
    if(!confirm("Are you sure you want to delete?")) return;
    const bId = document.getElementById("BookingID").value;
    try {
      await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: _k, data: { "Booking ID": bId, "_delete": true } }) });
      closeModal(); loadLedger();
    } catch(e) { alert("Error."); }
  }


  function openModal(isEdit) { 
    document.getElementById("modalOverlay").style.display = "flex"; 
    document.body.style.overflow = "hidden";
    if(!isEdit) {
      document.getElementById("modalTitle").innerText = "Add Record";
	  document.getElementById("BookingID").value = "";
	  renderUnitDropdown(UNITS);
    } else {
	  updateAvailableUnits();
	}
  }

  function closeModal() { 
    document.getElementById("modalOverlay").style.display = "none"; 
    document.body.style.overflow = "auto";
    
    const delBtn = document.getElementById("deleteBtn");
    if(delBtn) {
      delBtn.style.display = "none";
      delBtn.innerText = "Delete";
      delBtn.disabled = false;
    }

    const saveBtn = document.getElementById("saveBtn");
    if(saveBtn) {
      saveBtn.innerText = "Save";
      saveBtn.disabled = false;
    }

    document.querySelectorAll(".modal input, .modal select").forEach(i => {
      i.value = "";
      if(i.tagName === "SELECT") i.selectedIndex = 0; // Resets dropdown to "Select Unit..."
    });
	renderUnitDropdown(UNITS);
	document.getElementById("Check-Out").min = "";
  }
  
  loadLedger();
  setInterval(loadLedger, 45000); // Background sync every 45s
</script>
</body>
</html>
