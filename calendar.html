<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Torre KBR • Calendar</title>
  <style>
	header {
	  padding: 16px; 
	  border-bottom: 1px solid var(--border); 
	  background: #fff; 
	  position: sticky; 
	  top: 0; 
	  z-index: 50;
	  min-height: 70px;
	  display: flex;
	  align-items: center;
	}

	.headerInner {
	  width: 100%;
	  max-width: 1400px;
	  margin: 0 auto; 
	  display: flex; 
	  align-items: center; 
	  justify-content: space-between;
	  gap: 20px;
	}

	h1 {
	  margin: 0; 
	  font-size: 18px; 
	  font-weight: 800;
	  white-space: nowrap;
	}

	.wrap {
	  max-width: 1400px;
	  margin: 0 auto; 
	  padding: 15px;
	}

	.toolbar {
	  display: grid;
	  grid-template-columns: auto 1fr auto auto; 
	  gap: 12px;
	  align-items: center; 
	  background: #fff; 
	  border: 1px solid var(--border); 
	  border-radius: 12px; 
	  padding: 10px; 
	  margin-bottom: 20px; 
	  box-shadow: var(--shadow);
	}
	:root{
      --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --shadow:0 10px 15px -3px rgba(0,0,0,0.1);
      --accent:#2563eb; --danger:#dc2626; --success:#10b981;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
    .mainLink{text-decoration:none; background:#0f172a; color:#fff; padding:8px 16px; border-radius:8px; font-weight:600; font-size:13px;display: inline-flex;align-items: center;flex-shrink: 0;}
    #monthDisplay { font-weight: 800; font-size: 18px; flex-grow: 1; text-align: center; }
    .btn-nav { background: #f1f5f9; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: bold; }
    .cal-wrap { background:#fff; border-radius:12px; border:1px solid var(--border); overflow: hidden; box-shadow:var(--shadow); }
    table { 
	  width:100%;
	  border-collapse:collapse;
	  table-layout: fixed;
	  background: #fff;
	}
    th { background:#f8fafc; color:var(--accent); padding:12px; border-bottom:2px solid var(--border); font-size: 11px; text-transform:uppercase; letter-spacing: 0.05em; }
	td {
	  height: 120px; 
	  min-height: 120px;
	  vertical-align: top;
	  padding: 5px; 
	  border: 1px solid #f1f5f9;
	  position: relative;
	  overflow: visible;
	}
	td:hover {
	  background-color: #f8fafc;
	}
	td:empty {
	  background: #f1f5f9;
	}
	.day-num {
	  font-weight: 700;
	  font-size: 13px;
	  margin-bottom: 6px;
	  display: block;
	  color: black;
	  width: 24px;       
	  height: 24px;      
	  line-height: 24px; 
	  text-align: center;
	  margin-left: 4px;  
	}
	.today .day-num {
	  background: var(--accent);
	  color: white !important;
	  border-radius: 50%;
	}

	/* NEW DAILY TEXT LIST STYLE (Replacing old Booking Bars) */
	.booking-item {
	  font-size: 11px;
	  font-weight: 700;
	  padding: 4px 6px;
	  margin: 3px 0;
	  border-radius: 6px;
	  color: white;
	  cursor: pointer;
	  display: block;
	  transition: transform 0.1s, filter 0.1s;
	  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
	  white-space: nowrap;
	  overflow: hidden;
	  text-overflow: ellipsis;
	}
	.booking-item:hover {
	  filter: brightness(1.15);
	  transform: translateY(-1px);
	}
	
	/* Color Coding by Unit Groupings */
	.tag-D1, .tag-D2 { background: #7c3aed !important; } /* Purple */
	.tag-C1, .tag-C2, .tag-C3 { background: #059669 !important; } /* Green */
	.tag-B1, .tag-B2 { background: #ea580c !important; } /* Orange */
	.tag-A1, .tag-A2 { background: #db2777 !important; } /* Pink */
	.tag-RM { background: #2563eb !important; } /* Blue */
	.tag-default { background: #64748b !important; } /* Fallback Gray */
	
    .sync-status { 
      font-size: 9px; color: #fff; font-weight: 800; text-transform: uppercase; 
      background: var(--muted); padding: 6px 10px; border-radius: 6px; 
      text-align: center; line-height: 1.1; min-width: 90px; white-space: nowrap;
    }
    .status-ok { background: var(--success) !important; }
    .status-loading { background: var(--accent) !important; animation: pulse 1s infinite; }
    
    /* MODAL STYLES */
    .modal-overlay {
	  position:fixed;
	  inset:0;
	  background: rgba(15,23,42,0.8);
	  display:none;
	  justify-content:center;
	  align-items:center;
	  z-index:1000;
	  backdrop-filter: blur(4px);
	  padding:20px;
	}
    .modal {
	  background:#fff;
	  width:100%;
	  max-width: 420px;
	  border-radius: 20px;
	  padding: 24px;
	  max-height: 90vh;
	  box-shadow:  0 20px 25px -5px rgba(0,0,0,0.2);
	  overflow-y: auto;
	}
    .modal h2 { margin: 0 0 20px 0; color: var(--accent); font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; padding-bottom: 6px; border-bottom: 1px dashed #f1f5f9; }
    .detail-label { font-weight: 700; color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.03em; }
    .detail-val { font-weight: 600; color: #1e293b; }
    .close-btn { margin-top: 20px; width: 100%; background: #0f172a; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px; }
  
  /* Mobile Optimizations */
  @media screen and (max-width: 600px) {
    .wrap { padding: 10px; }
    .toolbar { gap: 5px; padding: 5px; }
    #monthDisplay { font-size: 14px; }
    th { padding: 5px 2px; font-size: 9px; }
    td { height: 90px; min-height: 90px; padding: 2px; }
    .day-num { font-size: 11px; width: 18px; height: 18px; line-height: 18px; margin-left: 2px; margin-bottom: 2px; }
    .booking-item { padding: 2px 4px; font-size: 8px; margin: 1px 0; border-radius: 4px; }
  }
  </style>
</head>
<body>

<header>
  <div class="headerInner">
    <h1>Torre KBR • Calendar</h1>
    <a href="guests.html" class="mainLink">Guest Info.</a>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <button class="btn-nav" onclick="changeMonth(-1)">❮</button>
    <div id="monthDisplay">Loading...</div>
	<div id="syncStatus" class="sync-status">Initial Sync</div>
    <button class="btn-nav" onclick="changeMonth(1)">❯</button>
  </div>
  <div class="cal-wrap">
    <table>
      <thead><tr><th>SUN</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr></thead>
      <tbody id="calendarBody"></tbody>
    </table>
  </div>
</div>

<div id="detailModal" class="modal-overlay" onclick="this.style.display='none'">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="popUnit">Unit Details</h2>
    <div id="popContent"></div>
    <button class="close-btn" onclick="document.getElementById('detailModal').style.display='none'">Close Details</button>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzv3aXkkAihx0hiR5tFx3VlabaYpLiAdqaysldk-0RwcyMNTW_1qfbANudn9FkSIllCdQ/exec"; 
  const _k = atob("a2JyX3N1cGVyX3NlY3JldF8yMDI2");
  
  let RAW_RECORDS = [];
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();

  async function loadLedger() {
    const statusEl = document.getElementById("syncStatus");
    statusEl.className = "sync-status status-loading";
    statusEl.innerText = "Syncing...";
	
    try {
      const resp = await fetch(`${API_URL}?key=${_k}`);
      const res = await resp.json();
      
      if(res.ok) { 
        RAW_RECORDS = res.records;
        renderCalendar();
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        statusEl.className = "sync-status status-ok";
        statusEl.innerHTML = `Synced<br>${timeStr}`;
      } else {
        statusEl.innerText = "Auth Error";
        statusEl.className = "sync-status";
        statusEl.style.background = "var(--danger)";
      }
    } catch(e) { 
        console.error("Sync Error:", e);
        statusEl.innerText = "Error";
        statusEl.className = "sync-status";
        statusEl.style.background = "var(--danger)";
    }
  }

  function showDetails(idx) {
      const r = RAW_RECORDS[idx];
      document.getElementById("popUnit").innerText = "Unit(s) " + (r["Unit"] || "??");
      
      const fields = [
        { l: "GUEST NAME", k: "Name" },
        { l: "CHECK-IN", k: "Check-In" },
		{ l: "CHECK-OUT", k: "Check-Out" },
        { l: "PAX", k: "# of Pax" },
        { l: "TOTAL AMOUNT", k: "Total" },
        { l: "DOWNPAYMENT", k: "DP" },
        { l: "BALANCE", k: "Balance" },
        { l: "M.O.P", k: "MOP" },
        { l: "CONTACT", k: "CP No." },
        { l: "REMARKS", k: "Remarks" }
      ];
  
      document.getElementById("popContent").innerHTML = fields.map(f => {
        const value = r[f.k];
        return `
          <div class="detail-row">
            <span class="detail-label">${f.l}</span>
            <span class="detail-val">${(value !== undefined && value !== "") ? value : "--"}</span>
          </div>
        `;
      }).join('');
      
      document.getElementById("detailModal").style.display = "flex";
  }

  function renderCalendar() {
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById("monthDisplay").innerText = `${monthNames[currentMonth]} ${currentYear}`;
    const calBody = document.getElementById("calendarBody");
    calBody.innerHTML = "";
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    // Custom order mapping for the sorted display
    const unitOrder = ["D1", "D2", "C1", "C2", "C3", "B1", "B2", "A1", "A2", "Rm A", "Rm B", "Rm C"];
  
    let date = 1;
    for (let i = 0; i < 6; i++) {
      let row = document.createElement("tr");
      let hasDateInRow = false;
  
      for (let j = 0; j < 7; j++) {
        let cell = document.createElement("td");
        
        if ((i === 0 && j < firstDay) || date > daysInMonth) {
          cell.innerHTML = ""; 
        } else {
          hasDateInRow = true;
          const cellDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
          
		  const now = new Date();
		  const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
		  
		  if (cellDateStr === todayStr) {
		    cell.classList.add("today");
		  }
		  
          // Filter records where the date falls strictly within Check-In and before Check-Out
          const dayBookings = RAW_RECORDS.map((r, index) => ({...r, index}))
            .filter(r => {
              const checkIn = r["Check-In"] ? r["Check-In"].split('T')[0] : "";
              const checkOut = r["Check-Out"] ? r["Check-Out"].split('T')[0] : checkIn;
              return cellDateStr >= checkIn && cellDateStr < checkOut;
            });
          
		  // Start with the day number container
		  let cellHtml = `<div class="day-num">${date}</div>`;
		  
		  // Collect all individual units available for this day first
		  let flatDayUnits = [];
		  
		  dayBookings.forEach(b => {
			const unitRaw = String(b["Unit"] || "");
			const unitArray = unitRaw.split(",").map(u => u.trim()).filter(u => u !== "");
			const pax = b["# of Pax"] || "0";
			
			unitArray.forEach(u => {
			  flatDayUnits.push({
			    fullString: u,
			    pax: pax,
			    index: b.index
			  });
			});
          });

		  // Sort collected units based on your predefined order array
		  flatDayUnits.sort((a, b) => {
		    // Match prefix up to the first space or end of string (handles "A1" vs "A1 (Extra)" cleanly)
		    const matchA = a.fullString.split(' ')[0];
		    const matchB = b.fullString.split(' ')[0];
		    
		    // Fallback if item isn't in your order list (places unrecognized units at the bottom)
		    let orderA = unitOrder.indexOf(matchA);
		    let orderB = unitOrder.indexOf(matchB);
		    
		    if (orderA === -1) orderA = 999;
		    if (orderB === -1) orderB = 999;
		    
		    return orderA - orderB;
		  });
		  
		  // Render sorted components to HTML
		  flatDayUnits.forEach(item => {
		    const baseUnitCode = item.fullString.split(' ')[0];
		    
		    // Standardize CSS class match for Rm variants
		    let cleanClassCode = baseUnitCode;
		    if (baseUnitCode.toLowerCase().startsWith("rm")) {
		      cleanClassCode = "RM";
		    }
		    
		    const colorClass = `tag-${cleanClassCode}`;
		    
		    cellHtml += `
			  <div class="booking-item ${colorClass}" 
			       onclick="showDetails(${item.index})" 
			       title="${item.fullString} - ${item.pax} Pax">
			    ${item.fullString} - ${item.pax} Pax
			  </div>`;
		  });
		  
		  cell.innerHTML = cellHtml;
		  date++;
        }
        row.appendChild(cell);
      }
      if (hasDateInRow || date <= daysInMonth) {
        calBody.appendChild(row);
      }
    }
  }
  
  setInterval(loadLedger, 30000);

  function changeMonth(step) {
    currentMonth += step;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  loadLedger();
</script>
</body>
</html>
