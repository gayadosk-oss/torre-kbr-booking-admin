<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Torre KBR • Planner</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);
      --accent:#2563eb; --bookBg:#fee2e2; --bookText:#991b1b;
      --dateCircleBg: #e0f2fe; --dateTextColor: #0369a1; --error:#dc2626; --warning: #f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:16px; border-bottom:1px solid var(--border); background:#fff; position:sticky; top:0; z-index:50}
    .headerInner{max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between}
    h1{margin:0; font-size:20px; font-weight:800}
    .mainLink{text-decoration:none; background:#0f172a; color:#fff; padding:8px 16px; border-radius:8px; font-weight:600; font-size:14px}
    .wrap{max-width:1200px; margin:0 auto; padding:20px}
    .toolbar{display:flex; gap:12px; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; box-shadow:var(--shadow); margin-bottom:20px}
    select, button, input[type="text"]{border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:14px}
    button{cursor:pointer; font-weight:600; background:#fff}
    button.primary{background:var(--accent); color:#fff; border:none; padding:10px 20px}
    .grid{background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; box-shadow:var(--shadow)}
    .dow{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; padding-bottom:12px; font-weight:700; font-size:12px; color:var(--muted); text-transform:uppercase}
    .days{display:grid; grid-template-columns:repeat(7,1fr); gap:12px}
    .day{min-height:120px; border:1px solid #f1f5f9; border-radius:10px; padding:10px; cursor:pointer; font-size:11px; display:flex; flex-direction:column; gap:4px}
    .day:hover{border-color:var(--accent); background:#fcfcfc}
    .day.muted{opacity:0.2; pointer-events:none; background:#f8fafc}
    .date{width:26px; height:26px; background:var(--dateCircleBg); color:var(--dateTextColor); display:flex; align-items:center; justify-content:center; border-radius:50%; font-weight:800; margin-bottom:6px}
    .unitRow{display:flex; justify-content:space-between; padding:3px 6px; border-radius:6px; border-bottom:1px solid #f8fafc}
    .unitRow.booked{background:var(--bookBg); color:var(--bookText); font-weight:700}
    .uLab{font-weight:800; opacity:0.7; width:35px}
    .uVal{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; text-align:right}
    .modalOverlay{position:fixed; inset:0; background:rgba(15, 23, 42, 0.6); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; backdrop-filter: blur(4px)}
    .modal{background:#fff; width:100%; max-width:650px; border-radius:16px; padding:24px; max-height:90vh; overflow-y:auto}
    .unitGrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .unitCard{border:1px solid var(--border); padding:12px; border-radius:10px; display:flex; align-items:center; gap:12px; background:#f8fafc}
    .actions{margin-top:24px; display:flex; justify-content:flex-end; gap:12px; border-top:1px solid var(--border); padding-top:20px}
    @media (max-width:850px){ .days{grid-template-columns:repeat(2,1fr)} .unitGrid{grid-template-columns:1fr} }
  </style>
</head>
<body>
<header><div class="headerInner"><h1>Torre KBR Planner</h1><a href="index.html" class="mainLink">Main Menu</a></div></header>
<div class="wrap">
  <div class="toolbar">
    <div>
      <select id="monthSelect"></select> 
      <button onclick="changeMonth(-1)">◀</button> 
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div>
      <span id="saveStatus" style="font-weight:700; font-size:11px; margin-right:12px; text-transform:uppercase;">Initializing...</span>
      <button onclick="fetchCloudData()">🔄 Sync</button>
    </div>
  </div>
  <div class="grid">
    <div class="dow"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
    <div id="daysGrid" class="days"></div>
  </div>
</div>

<div id="modalOverlay" class="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin-top:0;">Update Bookings</h2>
    <div id="unitInputs" class="unitGrid"></div>
    <div class="actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="saveBtn">Save to Sheet</button>
    </div>
  </div>
</div>

<script>
  const YEAR = 2026;
  const API_URL = "https://script.google.com/macros/s/AKfycbzv3aXkkAihx0hiR5tFx3VlabaYpLiAdqaysldk-0RwcyMNTW_1qfbANudn9FkSIllCdQ/exec"; 
  const API_KEY = "kbr_super_secret_2026";
  const UNITS = ["D1","D2","C1","C2","C3","B1","B2","A1","A2","RM A","RM B","RM C"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let data = {}; 
  let currentMonth = new Date().getMonth();
  let activeDate = null;
  let syncTimer = null;

  async function fetchCloudData() {
    const statusEl = document.getElementById("saveStatus");
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    try {
      const resp = await fetch(`${API_URL}?t=${Date.now()}`);
      if (!resp.ok) throw new Error();
      const result = await resp.json();
      
      if (result.ok) {
        data = {}; 
        if (result.records) {
          result.records.forEach(row => {
            const d = String(row["Date"]).trim(), u = row["Unit"];
            if(d && u){
              if (!data[d]) data[d] = {};
              data[d][u] = { exists: true, remarks: String(row["Remarks"] || "").trim() };
            }
          });
        }
        localStorage.setItem('kbr_planner_cache', JSON.stringify(data));
        statusEl.textContent = `Last Sync: ${now}`;
        statusEl.style.color = "var(--muted)";
      }
    } catch (e) { 
        const cached = localStorage.getItem('kbr_planner_cache');
        if (cached) {
          data = JSON.parse(cached);
          statusEl.textContent = "Offline Mode (Cached)";
          statusEl.style.color = "var(--warning)";
        } else {
          statusEl.textContent = "Offline - No Data";
          statusEl.style.color = "var(--error)";
        }
    }
    render(); 
  }

  // --- AUTO REFRESH LOGIC ---
  function startAutoSync() {
    if(syncTimer) clearInterval(syncTimer);
    syncTimer = setInterval(() => {
      // Only auto-sync if the modal is closed (don't refresh while user is typing)
      if (document.getElementById("modalOverlay").style.display !== "flex") {
        fetchCloudData();
      }
    }, 30000); // 30 seconds
  }

  function render() {
    const grid = document.getElementById("daysGrid"); grid.innerHTML = "";
    const firstDay = new Date(YEAR, currentMonth, 1).getDay();
    const daysInMonth = new Date(YEAR, currentMonth + 1, 0).getDate();
    for(let i=0; i<firstDay; i++) grid.appendChild(Object.assign(document.createElement("div"), {className: "day muted"}));
    
    for(let d=1; d<=daysInMonth; d++) {
      const dateStr = `${YEAR}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayData = data[dateStr] || {};
      const div = document.createElement("div"); div.className = "day"; div.onclick = () => openModal(dateStr);
      let html = `<div class="date">${d}</div>`;
      
      const bookedUnits = UNITS.filter(u => dayData[u] && dayData[u].exists === true);
      bookedUnits.forEach(u => {
        html += `<div class="unitRow booked"><span class="uLab">${u}</span><span class="uVal">${dayData[u].remarks || "BOOKED"}</span></div>`;
      });
      div.innerHTML = html;
      grid.appendChild(div);
    }
  }

  function openModal(dateStr) {
    activeDate = dateStr; 
    document.getElementById("modalTitle").textContent = "Date: " + dateStr;
    const container = document.getElementById("unitInputs"); container.innerHTML = "";
    const dayData = data[dateStr] || {};
    UNITS.forEach(u => {
      const v = dayData[u] || { exists: false, remarks: "" };
      container.innerHTML += `<div class="unitCard">
        <label style="width:35px;font-weight:800;color:var(--accent)">${u}</label>
        <input type="checkbox" id="chk-${u}" ${v.exists?'checked':''}>
        <input type="text" id="rem-${u}" placeholder="..." value="${v.remarks}">
      </div>`;
    });
    UNITS.forEach(u => {
      const chk = document.getElementById(`chk-${u}`);
      const rem = document.getElementById(`rem-${u}`);
      chk.onchange = () => { if (!chk.checked) rem.value = ""; };
    });
    document.getElementById("modalOverlay").style.display = "flex";
  }

  document.getElementById("saveBtn").onclick = async () => {
    if (!navigator.onLine) { alert("Offline. Cannot save."); return; }
    const payload = []; const idDate = activeDate.replace(/-/g, "");
    UNITS.forEach(u => {
      payload.push({ 
        "Booking ID": idDate + u, "Date": activeDate, "Unit": u, 
        "Remarks": document.getElementById(`rem-${u}`).value.trim(),
        "_isTicked": document.getElementById(`chk-${u}`).checked 
      });
    });
    closeModal();
    document.getElementById("saveStatus").textContent = "Saving...";
    try {
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ key: API_KEY, data: payload }) });
        setTimeout(fetchCloudData, 2000); 
    } catch (e) { alert("Save Failed"); }
  };

  function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }
  function changeMonth(s) { currentMonth = (currentMonth+s+12)%12; document.getElementById("monthSelect").value = currentMonth; render(); }
  
  window.addEventListener('online', () => fetchCloudData());

  const sel = document.getElementById("monthSelect");
  MONTHS.forEach((m, i) => sel.add(new Option(`${m} ${YEAR}`, i)));
  sel.value = currentMonth; 
  render(); 
  fetchCloudData();
  startAutoSync(); // Start the 30-second timer
</script>
</body>
</html>
